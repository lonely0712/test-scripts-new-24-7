<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shadowrocket Module Installer</title>
  <link rel="stylesheet" href="index.css" />
  <style>
    .top-box {
      width: 100%;
      max-width: 700px;
      background: #181818;
      border: 2px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      box-sizing: border-box;
    }
    .top-box h2 {
      margin-top: 0;
      color: #00ffe1;
    }
    .helper-text {
      color: #bbb;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .paste-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .paste-row input {
      flex: 1;
      min-width: 240px;
      padding: 0.85rem 1rem;
      border: 2px solid #2a2a2a;
      background: #101010;
      color: #fff;
      border-radius: 10px;
      font-size: 1rem;
    }
    .paste-row button,
    .action-btn {
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      background: #00ffe1;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .paste-row button:hover,
    .action-btn:hover {
      background: #00d5be;
    }
    .result-box {
      margin-top: 1rem;
      display: none;
      background: #101010;
      border-radius: 10px;
      padding: 1rem;
      text-align: left;
    }
    .result-box code {
      display: block;
      word-break: break-all;
      color: #d7d7d7;
      margin-bottom: 0.75rem;
    }
    .stats {
      margin-bottom: 1.5rem;
      color: #aaa;
    }
    .empty-state {
      color: #888;
      text-align: center;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>Shadowrocket Modules</h1>
  <p>Install modules directly in Shadowrocket from this page.</p>

  <div class="top-box">
    <h2>Paste Any GitHub Module Link</h2>
    <div class="helper-text">
      Paste a GitHub raw link or normal blob link. It will be converted automatically.
    </div>

    <div class="paste-row">
      <input id="githubInput" placeholder="Paste GitHub module link here..." />
      <button onclick="generateInstall()">Generate</button>
    </div>

    <div id="resultBox" class="result-box">
      <strong>Raw URL</strong>
      <code id="rawOutput"></code>
      <a id="manualInstallBtn" class="action-btn" href="#" target="_self">Install in Shadowrocket</a>
    </div>
  </div>

  <div class="search-container">
    <input id="searchInput" type="text" placeholder="Search modules..." />
  </div>

  <div class="stats" id="stats">Loading modules...</div>
  <div class="module-list" id="moduleList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">No modules found.</div>

  <script>
    const GITHUB_USER = "lonely0712";
    const GITHUB_REPO = "Scripts";
    const GITHUB_BRANCH = "main";

    function convertToRaw(url) {
      try {
        url = url.trim();

        if (url.includes("raw.githubusercontent.com")) {
          return url;
        }

        if (url.includes("github.com")) {
          return url
            .replace("https://github.com/", "https://raw.githubusercontent.com/")
            .replace("/blob/", "/");
        }

        return url;
      } catch {
        return url;
      }
    }

    function makeShadowrocketInstallUrl(rawUrl) {
      return "shadowrocket://install?module=" + encodeURIComponent(rawUrl);
    }

    function generateInstall() {
      const input = document.getElementById("githubInput").value.trim();
      if (!input) {
        alert("Paste a GitHub link first.");
        return;
      }

      const rawUrl = convertToRaw(input);
      const installUrl = makeShadowrocketInstallUrl(rawUrl);

      document.getElementById("rawOutput").textContent = rawUrl;
      document.getElementById("manualInstallBtn").href = installUrl;
      document.getElementById("resultBox").style.display = "block";
    }

    async function loadModules() {
      const list = document.getElementById("moduleList");
      const stats = document.getElementById("stats");
      const emptyState = document.getElementById("emptyState");

      try {
        const res = await fetch("./modules.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load modules.json");

        const modules = await res.json();
        window.allModules = modules;

        renderModules(modules);
        stats.textContent = `${modules.length} module${modules.length !== 1 ? "s" : ""} loaded automatically`;
        emptyState.style.display = modules.length ? "none" : "block";
      } catch (err) {
        list.innerHTML = "";
        stats.textContent = "Could not load modules.json";
        emptyState.style.display = "block";
        emptyState.textContent = "Failed to load modules list.";
        console.error(err);
      }
    }

    function renderModules(modules) {
      const list = document.getElementById("moduleList");
      const emptyState = document.getElementById("emptyState");
      list.innerHTML = "";

      if (!modules.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      modules.forEach(mod => {
        const item = document.createElement("div");
        item.className = "module-item";

        const title = document.createElement("div");
        title.className = "module-title";
        title.textContent = mod.name;

        const btn = document.createElement("a");
        btn.className = "install-button";

        const rawUrl =
          `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/modules/${encodeURIComponent(mod.file)}`;

        btn.href = makeShadowrocketInstallUrl(rawUrl);
        btn.textContent = "Install";
        btn.target = "_self";

        item.appendChild(title);
        item.appendChild(btn);
        list.appendChild(item);
      });
    }

    document.getElementById("searchInput").addEventListener("input", function () {
      const q = this.value.trim().toLowerCase();
      const filtered = (window.allModules || []).filter(m =>
        m.name.toLowerCase().includes(q) || m.file.toLowerCase().includes(q)
      );
      renderModules(filtered);

      const stats = document.getElementById("stats");
      stats.textContent = `${filtered.length} result${filtered.length !== 1 ? "s" : ""}`;
    });

    loadModules();
  </script>
</body>
</html>
