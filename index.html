<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open URL Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
    input { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 12px; }
    button { padding: 12px 18px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Open URL Test</h1>
  <input id="url" type="text" value="https://raw.githubusercontent.com/example/repo/main/file.txt">
  <button onclick="openUrl()">Open URL</button>

  <script>
    function openUrl() {
      const url = document.getElementById('url').value.trim();
      if (!url) return;
      window.location.href = url;
    }
  </script>
</body>
</html>
