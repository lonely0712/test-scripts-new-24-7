<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shadowrocket Module Installer</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
      margin: 0;
    }
    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }
    button {
      margin-top: 12px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    a.install {
      display: block;
      margin-top: 15px;
      padding: 12px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
    code {
      display: block;
      margin-top: 10px;
      word-break: break-all;
      background: #eee;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Shadowrocket Installer</h2>

    <p>Paste any GitHub module link:</p>
    <input id="input" placeholder="Paste GitHub link here..." />

    <button onclick="generate()">Generate Install Link</button>

    <a id="installBtn" class="install" style="display:none;">
      Install in Shadowrocket
    </a>

    <code id="output"></code>
  </div>

  <script>
    function convertToRaw(url) {
      try {
        if (url.includes("raw.githubusercontent.com")) {
          return url;
        }

        if (url.includes("github.com")) {
          return url
            .replace("github.com", "raw.githubusercontent.com")
            .replace("/blob/", "/");
        }

        return url;
      } catch {
        return url;
      }
    }

    function generate() {
      const input = document.getElementById("input").value.trim();

      if (!input) {
        alert("Paste a link first");
        return;
      }

      const raw = convertToRaw(input);
      const finalUrl = "shadowrocket://install?module=" + encodeURIComponent(raw);

      const btn = document.getElementById("installBtn");
      btn.href = finalUrl;
      btn.style.display = "block";

      document.getElementById("output").textContent = raw;
    }
  </script>
</body>
</html>
